name: ci

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: md2prompt-html
          path: dist/2youg1-md2prompt.html
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: cd e2e && bun install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - run: |
          cd e2e
          for g in life v13 note srcmode export look measure splitalign sourceanno xmlmode; do
            echo "=== $g ==="
            node "$g.mjs"
          done

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test
      - run: bun run build
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/2youg1-md2prompt.html
          generate_release_notes: true
