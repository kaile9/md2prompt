<!doctype html>
<html lang="zh-CN" data-theme="marble" data-style="geek">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 单文件应用需 unsafe-inline（全部代码/样式内联）；收紧远程内容面：无网络请求、无插件、无框架、无表单（D-6）。
       远程图片按 README 声明放行 https；data:/blob: 供内嵌图与目录句柄 object URL；KaTeX 字体为 data: -->
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'none'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'"
  />
  <link rel="icon" href="data:," />
  <title>2youg1的MD2Prompt</title>
</head>
<body>
  <div id="app">
    <header id="topbar">
      <button id="open-btn" type="button"></button>
      <button id="new-btn" type="button"></button>
      <span id="file-name"></span>
      <span id="save-state"></span>
      <span id="cursor-pos"></span>
      <button id="mode-btn" type="button"></button>
      <button id="settings-btn" type="button"></button>
    </header>
    <aside id="outline"></aside>
    <main id="page">
      <div id="scroller">
        <div id="gutter"></div>
        <article id="doc"></article>
      </div>
    </main>
    <aside id="changes"></aside>
    <div id="floater"></div>
    <div id="popover"></div>
    <div id="print-head"></div>
    <div id="print-foot"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
